services:
  mongo:
    image: mongo:7
    container_name: food-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.3
    environment:
       ZOOKEEPER_CLIENT_PORT: 2181
       ZOOKEEPER_TICK_TIME: 2000
    ports:
       - "22181:2181"
    networks: 
       - app-network

  kafka:
    image: confluentinc/cp-kafka:7.3.3
    container_name: food-kafka
    depends_on:
       - zookeeper
    ports:
       - "9092:9092"
    environment:
         KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
         KAFKA_ADVERTISED_HOST_NAME: kafka
         KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
        - app-network

  tests:
    build:
      context: .
      dockerfile: Tests.dockerfile
    container_name: food-tests
    depends_on:
      - mongo
      - foodservice1
      - foodservice2
    networks:
      - app-network
    environment:
      API_BASE_URL: "http://foodservice1:8080/"
    command: ["dotnet", "test", "FoodSelectionAPITests/FoodSelectionAPITest.csproj"]

  prometheus:
    image: prom/prometheus:latest
    container_name: food-prometheus
    depends_on:
      - foodservice1
      - foodservice2
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app-network
    ports:
      - "9090:9090"
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: food-redis
    ports:
       - "6380:6379"
    networks:
       - app-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: food-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app-network


  foodservice1:
    build:
      context: .
      dockerfile: ./first_microserv.dockerfile
    container_name: FoodService
    ports:
      - "7210:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"  
      MongoDbSettings__ConnectionString: "mongodb://admin:password@mongo:27017"
      MongoDbSettings__DatabaseName: "FoodDB1" 
      Kafka__BootstrapServers: "kafka:9092"
    restart: unless-stopped
    networks:
      - app-network
  
  foodservice2:
    build:
      context: .
      dockerfile: ./second_microserv.dockerfile
    container_name: foodservice2
    ports:
      - "7211:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
      MongoDbSettings__ConnectionString: "mongodb://admin:password@mongo:27017"
      MongoDbSettings__DatabaseName: "FoodDB2"
      Kafka__BootstrapServers: "kafka:9092"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped
    networks:
      - app-network
  
  user-service:
    build:
      context: ./UserService
      dockerfile: User.dockerfile

    container_name: food-user-service

    depends_on:
      - mongo
      - kafka

    ports:
      - "7212:8080"

    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__MongoDb: "mongodb://admin:password@mongo:27017"
      Kafka__BootstrapServers: "kafka:9092"

    restart: unless-stopped

    networks:
      - app-network

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:
  redis_data:

networks:
  app-network:
    driver: bridge