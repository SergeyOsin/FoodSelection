services:
  mongo:
    image: mongo:7
    container_name: food-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - app-network


  prometheus:
    image: prom/prometheus:latest
    container_name: food-prometheus
    depends_on:
      - foodservice1
      - foodservice2
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app-network
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: food-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app-network


  foodservice1:
    build:
      context: .
      dockerfile: ./first_microserv.dockerfile
    container_name: foodservice1
    ports:
      - "7210:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"  
      MongoDbSettings__ConnectionString: "mongodb://admin:password@mongo:27017"
      MongoDbSettings__DatabaseName: "FoodDB1" 
    restart: unless-stopped
    networks:
      - app-network

  foodservice2:
    build:
      context: .
      dockerfile: ./second_microserv.dockerfile
    container_name: foodservice2
    ports:
      - "7211:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
      MongoDbSettings__ConnectionString: "mongodb://admin:password@mongo:27017"
      MongoDbSettings__DatabaseName: "FoodDB2" 
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:

networks:
  app-network:
    driver: bridge